<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Design Hub</title>
    <meta
      name="description"
      content="Design Hub 是 Zon 的设计总入口。左侧选择 Webdesign / UX / Icon / Skills，右侧直接打开对应内容。"
    />
    <style>
      :root {
        color-scheme: dark;
        --bg: #000000;
        --surface: #050505;
        --line: #262626;
        --line-strong: #3a3a3a;
        --text: #ffffff;
        --muted: #8b8b8b;
        --muted-strong: #b7b7b7;
        --frame: #0a0a0a;
        --header-h: 52px;
        --nav-w: 224px;
        --display: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Georgia, serif;
        --sans: "Helvetica Neue", Arial, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        min-height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: var(--sans);
      }

      a,
      button {
        color: inherit;
        font: inherit;
      }

      a {
        text-decoration: none;
      }

      button {
        border: 0;
        background: transparent;
        cursor: pointer;
      }

      .site-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        height: var(--header-h);
        padding: 0 18px;
        border-bottom: 1px solid var(--line);
      }

      .brand {
        display: inline-flex;
        align-items: baseline;
        gap: 10px;
        font-size: 0.95rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .brand-mark {
        color: var(--muted);
        font-size: 0.76rem;
      }

      .brand strong {
        font-family: var(--display);
        font-size: 1.16rem;
        font-weight: 600;
        letter-spacing: -0.03em;
        text-transform: none;
      }

      .top-link {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        min-height: 28px;
        color: var(--muted-strong);
        font-size: 0.82rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        border-bottom: 1px solid transparent;
        transition: color 120ms ease, border-color 120ms ease;
      }

      .top-link:hover,
      .top-link:focus-visible,
      .route-button:hover,
      .route-button:focus-visible,
      .route-open-link:hover,
      .route-open-link:focus-visible,
      .skills-link:hover,
      .skills-link:focus-visible {
        color: var(--text);
        border-color: currentColor;
      }

      .app-shell {
        display: grid;
        grid-template-columns: var(--nav-w) minmax(0, 1fr);
        min-height: calc(100vh - var(--header-h));
      }

      .route-nav {
        border-right: 1px solid var(--line);
      }

      .route-list {
        display: grid;
      }

      .route-button {
        display: grid;
        gap: 4px;
        width: 100%;
        padding: 18px 18px 16px;
        border-bottom: 1px solid var(--line);
        text-align: left;
        transition: padding-left 120ms ease, color 120ms ease;
      }

      .route-button.is-active {
        padding-left: 24px;
      }

      .route-button.is-active .route-name {
        font-weight: 700;
      }

      .route-button.is-active .route-sub {
        color: var(--text);
      }

      .route-button.is-active::before,
      .route-button:hover::before,
      .route-button:focus-visible::before {
        opacity: 1;
      }

      .route-button::before {
        content: "";
        position: absolute;
        left: 0;
        width: 1px;
        height: 28px;
        background: var(--text);
        opacity: 0;
        transition: opacity 120ms ease;
      }

      .route-button {
        position: relative;
      }

      .route-name {
        font-size: 1.05rem;
        letter-spacing: -0.02em;
      }

      .route-sub {
        color: var(--muted);
        font-size: 0.76rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .viewer {
        display: grid;
        grid-template-rows: 42px minmax(0, 1fr);
        min-width: 0;
      }

      .viewer-topline {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 0 18px;
        border-bottom: 1px solid var(--line);
      }

      .viewer-route {
        display: grid;
        align-content: center;
        gap: 2px;
        min-width: 0;
      }

      .viewer-kicker {
        color: var(--muted);
        font-size: 0.68rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .viewer-title {
        margin: 0;
        color: var(--text);
        font-family: var(--display);
        font-size: 1.1rem;
        font-weight: 600;
        letter-spacing: -0.03em;
        line-height: 1;
      }

      .route-open-link {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: var(--muted-strong);
        font-size: 0.76rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        border-bottom: 1px solid transparent;
        transition: color 120ms ease, border-color 120ms ease;
      }

      .viewer-stage {
        position: relative;
        min-height: 0;
        background: var(--frame);
      }

      .viewer-stage.is-loading .viewer-frame {
        opacity: 0;
      }

      .viewer-stage.is-loading .loading-state {
        opacity: 1;
        pointer-events: auto;
      }

      .viewer-frame,
      .skills-surface {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        border: 0;
      }

      .viewer-frame {
        background: #ffffff;
        opacity: 1;
        transition: opacity 100ms ease;
      }

      .viewer-frame.is-hidden,
      .skills-surface.is-hidden {
        display: none;
      }

      .loading-state {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        background: #000000;
        color: #ffffff;
        font-size: 0.78rem;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        opacity: 0;
        pointer-events: none;
        transition: opacity 100ms ease;
      }

      .skills-surface {
        display: grid;
        align-content: start;
        gap: 18px;
        padding: 30px 28px 28px;
        overflow: auto;
        background: #000000;
      }

      .skills-pre {
        margin: 0;
        padding: 0;
        color: var(--text);
        font-family: "SFMono-Regular", SFMono-Regular, Consolas, "Liberation Mono", Menlo, monospace;
        font-size: 0.88rem;
        line-height: 1.85;
        white-space: pre-wrap;
      }

      .skills-links {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }

      .skills-link {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: var(--muted-strong);
        font-size: 0.8rem;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        border-bottom: 1px solid transparent;
        transition: color 120ms ease, border-color 120ms ease;
      }

      @media (max-width: 840px) {
        .app-shell {
          grid-template-columns: 1fr;
          grid-template-rows: auto minmax(0, 1fr);
        }

        .route-nav {
          overflow-x: auto;
          border-right: 0;
          border-bottom: 1px solid var(--line);
        }

        .route-list {
          grid-auto-flow: column;
          grid-auto-columns: minmax(148px, 1fr);
        }

        .route-button {
          min-height: 64px;
          padding: 14px 16px;
          border-bottom: 0;
          border-right: 1px solid var(--line);
        }

        .route-button.is-active {
          padding-left: 16px;
        }

        .route-button::before {
          left: auto;
          bottom: 0;
          width: 100%;
          height: 1px;
        }

        .viewer {
          min-height: calc(100vh - var(--header-h) - 65px);
        }
      }
    </style>
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="/" aria-label="Design Hub home">
        <span class="brand-mark">Zon</span>
        <strong>Design Hub</strong>
      </a>
      <a class="top-link" href="https://github.com/EOMZON/design-hub" target="_blank" rel="noreferrer noopener">
        GitHub ↗
      </a>
    </header>

    <main class="app-shell">
      <nav class="route-nav" aria-label="Design routes">
        <div class="route-list">
          <button class="route-button" type="button" data-route="webdesign">
            <span class="route-name">Webdesign</span>
            <span class="route-sub">视觉方向</span>
          </button>
          <button class="route-button" type="button" data-route="ux">
            <span class="route-name">UX</span>
            <span class="route-sub">用户路径</span>
          </button>
          <button class="route-button" type="button" data-route="icon">
            <span class="route-name">Icon</span>
            <span class="route-sub">识别系统</span>
          </button>
          <button class="route-button" type="button" data-route="skills">
            <span class="route-name">Skills</span>
            <span class="route-sub">复用资产</span>
          </button>
        </div>
      </nav>

      <section class="viewer" aria-label="Embedded route view">
        <div class="viewer-topline">
          <div class="viewer-route">
            <span class="viewer-kicker">Current Route</span>
            <p class="viewer-title" id="route-label">Webdesign</p>
          </div>
          <a
            class="route-open-link"
            id="route-open"
            href="https://webdesign.zondev.top/browse"
            target="_blank"
            rel="noreferrer noopener"
            aria-label="Open Webdesign in new tab"
            title="webdesign.zondev.top/browse"
          >
            Open ↗
          </a>
        </div>

        <div class="viewer-stage is-loading" id="viewer-stage">
          <div class="loading-state" id="loading-state">Loading...</div>
          <iframe
            class="viewer-frame"
            id="viewer-frame"
            title="Embedded site view"
            src="https://webdesign.zondev.top/browse"
          ></iframe>

          <section class="skills-surface is-hidden" id="skills-surface" aria-label="Design Skills">
            <pre class="skills-pre" id="skills-pre"></pre>
            <div class="skills-links">
              <a
                class="skills-link"
                href="https://github.com/EOMZON/design-skills"
                target="_blank"
                rel="noreferrer noopener"
              >
                GitHub Repo ↗
              </a>
              <a
                class="skills-link"
                href="https://github.com/EOMZON/design-hub/blob/main/README.md"
                target="_blank"
                rel="noreferrer noopener"
              >
                Hub README ↗
              </a>
            </div>
          </section>
        </div>
      </section>
    </main>

    <script>
      const routes = {
        webdesign: {
          label: "Webdesign",
          domain: "webdesign.zondev.top/browse",
          href: "https://webdesign.zondev.top/browse",
          type: "iframe"
        },
        ux: {
          label: "UX",
          domain: "ux.zondev.top",
          href: "https://ux.zondev.top",
          type: "iframe"
        },
        icon: {
          label: "Icon",
          domain: "icon.zondev.top",
          href: "https://icon.zondev.top",
          type: "iframe"
        },
        skills: {
          label: "Skills",
          domain: "github.com/EOMZON/design-skills",
          href: "https://github.com/EOMZON/design-skills",
          type: "skills",
          text: [
            "design-skills",
            "",
            "把已经选好的方向",
            "整理成 AI 可以继续调用的资产。",
            "",
            "prompt templates",
            "skill files",
            "shared constraints",
            "",
            "适合",
            "- 继续喂给 Cursor / Claude",
            "- 把规则沉淀成可复用 skill",
            "- 在不同设计站之间共用约束",
            "",
            "open",
            "- github: https://github.com/EOMZON/design-skills",
            "- readme: https://github.com/EOMZON/design-hub/blob/main/README.md"
          ].join("\n")
        }
      };

      const routeButtons = Array.from(document.querySelectorAll(".route-button"));
      const routeLabel = document.getElementById("route-label");
      const routeOpen = document.getElementById("route-open");
      const viewerStage = document.getElementById("viewer-stage");
      const viewerFrame = document.getElementById("viewer-frame");
      const skillsSurface = document.getElementById("skills-surface");
      const skillsPre = document.getElementById("skills-pre");

      let currentRoute = "";

      function setActiveButton(routeId) {
        routeButtons.forEach((button) => {
          const active = button.dataset.route === routeId;
          button.classList.toggle("is-active", active);
          button.setAttribute("aria-pressed", active ? "true" : "false");
        });
      }

      function renderSkills(route) {
        viewerStage.classList.remove("is-loading");
        viewerFrame.classList.add("is-hidden");
        skillsSurface.classList.remove("is-hidden");
        skillsPre.textContent = route.text;
      }

      function renderIframe(route) {
        skillsSurface.classList.add("is-hidden");
        viewerFrame.classList.remove("is-hidden");
        viewerStage.classList.add("is-loading");

        if (viewerFrame.src !== route.href) {
          viewerFrame.src = route.href;
        } else {
          requestAnimationFrame(() => {
            viewerStage.classList.remove("is-loading");
          });
        }
      }

      function setRoute(routeId) {
        const route = routes[routeId] || routes.webdesign;
        currentRoute = routeId;
        setActiveButton(routeId);
        routeLabel.textContent = route.label;
        routeOpen.href = route.href;
        routeOpen.title = route.domain;
        routeOpen.setAttribute("aria-label", `Open ${route.label} in new tab`);

        if (route.type === "skills") {
          renderSkills(route);
        } else {
          renderIframe(route);
        }

        history.replaceState(null, "", `#${routeId}`);
      }

      routeButtons.forEach((button) => {
        button.addEventListener("click", () => {
          setRoute(button.dataset.route);
        });
      });

      viewerFrame.addEventListener("load", () => {
        if (currentRoute && routes[currentRoute]?.type === "iframe") {
          viewerStage.classList.remove("is-loading");
        }
      });

      const initialRoute = Object.prototype.hasOwnProperty.call(routes, window.location.hash.slice(1))
        ? window.location.hash.slice(1)
        : "webdesign";

      setRoute(initialRoute);

      window.addEventListener("hashchange", () => {
        const nextRoute = window.location.hash.slice(1);
        if (Object.prototype.hasOwnProperty.call(routes, nextRoute) && nextRoute !== currentRoute) {
          setRoute(nextRoute);
        }
      });
    </script>
  </body>
</html>
